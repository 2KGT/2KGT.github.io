name: Auto Sync Sileo Packages

on:
  push:
    paths:
      - 'debs/**'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev jq python3

      - name: Generate Repository Data
        id: info
        run: |
          # Kiểm tra thư mục debs
          if [ ! -d "debs" ] || [ -z "$(ls -A debs/*.deb 2>/dev/null)" ]; then 
            echo "Không tìm thấy file .deb"; exit 1; 
          fi
          chmod -R 644 debs/*.deb

          # 1. Xác định file vừa được thay đổi (cho thông báo)
          if [ "${{ github.event_name }}" == "push" ]; then
            CHANGED_FILE=$(git diff --name-only HEAD^ HEAD | grep 'debs/.*\.deb' | head -1)
          fi
          
          # Nếu không tìm thấy file thay đổi cụ thể, lấy file mới nhất
          TARGET_DEB=${CHANGED_FILE:-$(ls -t debs/*.deb | head -1)}
          
          TWEAK_NAME=$(dpkg-deb -f "$TARGET_DEB" Name || dpkg-deb -f "$TARGET_DEB" Package)
          TWEAK_VER=$(dpkg-deb -f "$TARGET_DEB" Version)
          FILENAME=$(basename "$TARGET_DEB")
          ENCODED_FILENAME=$(python3 -c "import urllib.parse; print(urllib.parse.quote(input()))" <<< "$FILENAME")
          DEB_URL="https://2kgt.github.io/repo/debs/$ENCODED_FILENAME"

          # 2. Tạo Depiction JSON
          mkdir -p depictions/images
          # Giữ lại các file cũ, chỉ ghi đè những gì thay đổi để tối ưu hóa
          for DEB in debs/*.deb; do
            [ -e "$DEB" ] || continue
            NAME=$(dpkg-deb -f "$DEB" Name || dpkg-deb -f "$DEB" Package)
            VER=$(dpkg-deb -f "$DEB" Version)
            AUTH=$(dpkg-deb -f "$DEB" Author || echo "Kyic")
            DESC=$(dpkg-deb -f "$DEB" Description || echo "No description.")
            CHGLOG=$(dpkg-deb -f "$DEB" Changelog || echo "New version update.")
            
            SCREENSHOTS_JSON="[]"
            for i in {1..5}; do
              if [ -f "depictions/images/${NAME}${i}.png" ]; then
                SCREENSHOTS_JSON=$(echo $SCREENSHOTS_JSON | jq ". += [{\"url\": \"https://2kgt.github.io/repo/depictions/images/${NAME}${i}.png\", \"accessibilityText\": \"Screenshot $i\"}]")
              fi
            done

            jq -n \
              --arg name "$NAME" --arg ver "$VER" --arg auth "$AUTH" --arg desc "$DESC" --arg chg "$CHGLOG" \
              --arg banner "https://2kgt.github.io/repo/depictions/images/${NAME}-banner.png" \
              --argjson ss "$SCREENSHOTS_JSON" \
              '{"min_bridge_version":"1.1","tabs":[{"tabname":"Chi tiết","class":"DepictionStackView","views":[(if .banner then {class:"DepictionImageView",url:$banner,width:1242,height:600} else empty end),{class:"DepictionHeaderView",title:$name},{class:"DepictionSubheaderView",title:("Phiên bản "+$ver)},(if ($ss|length>0) then {class:"DepictionScreenshotsView",itemCornerRadius:10,itemSize:"{160, 346}",screenshots:$ss} else empty end),{class:"DepictionMarkdownView",markdown:("### Mô tả\n"+$desc+"\n\n### Nhật ký thay đổi\n"+$chg),useRawFormat:true},{class:"DepictionSeparatorView"},{class:"DepictionTableTextView",title:"Nhà phát triển",text:$auth}]}],"class":"DepictionTabView"}' > "depictions/${NAME}.json"
          done

          # 3. Quét Packages
          dpkg-scanpackages -m debs /dev/null > Packages
          for DEB in debs/*.deb; do
            [ -e "$DEB" ] || continue
            CUR_FILE=$(basename "$DEB")
            CUR_NAME=$(dpkg-deb -f "$DEB" Name || dpkg-deb -f "$DEB" Package)
            ENC_NAME=$(python3 -c "import urllib.parse; print(urllib.parse.quote(input()))" <<< "$CUR_NAME")
            sed -i "/Filename: debs\/$CUR_FILE$/a Icon: https://2kgt.github.io/repo/icons/$CUR_NAME.png" Packages
            sed -i "/Filename: debs\/$CUR_FILE$/a SileoDepiction: https://2kgt.github.io/repo/depictions/$ENC_NAME.json" Packages
          done
          bzip2 -kf Packages

          # 4. Tạo Release
          {
            echo "Origin: Kyic Repository"; echo "Label: Kyic Repository"; echo "Suite: stable"; echo "Version: 1.0"
            echo "Codename: ios"; echo "Architectures: iphoneos-arm64 iphoneos-arm"; echo "Components: main"
            echo "Description: Kyic Repository - Kho lưu trữ tweaks chất lượng cao."; echo "Icon: icons/Kyic.png"
            echo "Date: $(date -R)"
          } > Release

          # 5. Đóng gói Output thông báo (Logic thông minh)
          NOTIFY_TYPE="system"
          if [ -n "$CHANGED_FILE" ]; then NOTIFY_TYPE="tweak_update"; fi
          
          # Truyền dữ liệu qua Output
          DATA=$(jq -nrc --arg type "$NOTIFY_TYPE" --arg name "$TWEAK_NAME" --arg ver "$TWEAK_VER" --arg url "$DEB_URL" \
            '{type: $type, name: $name, version: $ver, url: $url}')
          echo "notify_info=$DATA" >> $GITHUB_OUTPUT

      - name: "🚀 Sync & Push (No-Conflict Strategy)"
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Lưu tạm file quan trọng
          mkdir -p /tmp/repo_data/
          cp Packages* Release /tmp/repo_data/
          cp -r depictions/*.json /tmp/repo_data/
          
          git fetch origin main
          git reset --hard origin/main
          
          # Khôi phục dữ liệu
          cp /tmp/repo_data/Packages* .
          cp /tmp/repo_data/Release .
          cp /tmp/repo_data/*.json depictions/
          touch .nojekyll
          
          git add Packages* Release depictions/*.json .nojekyll
          git commit -m "Auto-update Sileo Repo [Automated]" || echo "No changes"
          git push origin main --force

      - name: "🤖 Telegram Notification"
        if: always()
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TO: ${{ secrets.TELEGRAM_TO }}
          RAW_DATA: ${{ steps.info.outputs.notify_info }}
          STATUS: ${{ job.status }}
        run: |
          TYPE=$(echo $RAW_DATA | jq -r '.type')
          NAME=$(echo $RAW_DATA | jq -r '.name')
          VER=$(echo $RAW_DATA | jq -r '.version')
          URL=$(echo $RAW_DATA | jq -r '.url')
          REAL_TIME=$(TZ="Asia/Ho_Chi_Minh" date +"%d/%m/%Y %H:%M")

          if [ "$TYPE" == "tweak_update" ] && [ "$STATUS" == "success" ]; then
            TITLE="🚀 <b>TWEAK MỚI XUẤT HIỆN</b>"
            BODY="📦 <b>Tweak:</b> <code>$NAME</code>\n💡 <b>Phiên bản:</b> <code>$VER</code>"
            BTN_TEXT="📥 Tải về .deb"
            BTN_URL="$URL"
          else
            TITLE="🔄 <b>ĐỒNG BỘ SILEO REPO</b>"
            BODY="📊 <b>Trạng thái:</b> <code>Cập nhật hệ thống thành công ✅</code>"
            BTN_TEXT="🌐 Mở Trang Chủ"
            BTN_URL="https://2kgt.github.io/repo/"
          fi

          MSG="$TITLE
          ──────────────────
          $BODY
          ⏰ <b>Thời gian:</b> <code>$REAL_TIME</code>
          ──────────────────"

          KEYBOARD=$(jq -nrc --arg url1 "https://2kgt.github.io/repo/" --arg url2 "$BTN_URL" --arg btn "$BTN_TEXT" '{
            inline_keyboard: [[
              {text: "🌐 Add source", url: $url1},
              {text: $btn, url: $url2}
            ]]
          }')

          curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
            -d "chat_id=$TO" -d "parse_mode=HTML" -d "disable_web_page_preview=true" \
            --data-urlencode "text=$MSG" \
            --data-urlencode "reply_markup=$KEYBOARD"
