name: "Auto Sync Esign apps.json"

on:
  push:
    paths:
      - 'apps/*.ipa'
  release:
    types: [published, edited]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: "Install Dependencies"
        run: npm install app-info-parser node-fetch@2

      - name: "Update apps.json"
        id: update_data
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const AppInfoParser = require(`${process.env.GITHUB_WORKSPACE}/node_modules/app-info-parser`);
            
            // 1. Đọc dữ liệu cũ để duy trì lịch sử (Persistence)
            let repoData = { 
              name: "Kyic Repository", 
              identifier: "com.2kgt.repo", 
              iconURL: "https://2kgt.github.io/repo/icons/Kyic.png",
              apps: [] 
            };
            if (fs.existsSync('apps.json')) {
              try { repoData = JSON.parse(fs.readFileSync('apps.json', 'utf8')); } catch (e) {}
            }

            const eventName = context.eventName;
            let appToNotify = null;
            const currentFilesURLs = new Set(); 

            const extractVersion = (f) => (f.match(/[_-]v?(\d+\.\d+(\.\d+)?)/i) || [null, "1.0"])[1];
            const cleanAppName = (f) => f.replace(/\.ipa$/i, '').replace(/[_-]v?\d+(\.\d+)*.*$/i, '').replace(/_/g, ' ').trim();

            const updateAppInRepo = (name, bundleId, vData) => {
              currentFilesURLs.add(vData.downloadURL);
              let app = repoData.apps.find(a => a.bundleIdentifier === bundleId || a.name.toLowerCase() === name.toLowerCase());
              
              if (!app) {
                app = { 
                  name, bundleIdentifier: bundleId, developerName: "Kyic", 
                  subtitle: name, category: "Utilities", 
                  iconURL: `https://2kgt.github.io/repo/icons/${name.replace(/\s+/g, '')}.png`,
                  appPermissions: { entitlements: [], privacy: {} },
                  versions: [] 
                };
                repoData.apps.push(app);
              }
              
              if (!app.versions.find(v => v.downloadURL === vData.downloadURL)) {
                app.versions.push(vData);
              }
              return app;
            };

            // --- NGUỒN 1: QUÉT THƯ MỤC APPS/ ---
            if (fs.existsSync('apps')) {
              const files = fs.readdirSync('apps').filter(f => f.toLowerCase().endsWith('.ipa'));
              let changedFiles = "";
              try { changedFiles = execSync('git diff --name-only HEAD^ HEAD').toString(); } catch (e) {}

              for (const file of files) {
                const path = `apps/${file}`;
                const name = cleanAppName(file);
                const version = extractVersion(file);
                let bundleId = "com.kyic." + name.replace(/\s+/g, '').toLowerCase();
                
                try {
                  const info = await (new AppInfoParser(path)).parse();
                  bundleId = info.CFBundleIdentifier || bundleId;
                } catch (e) {}

                const stats = fs.statSync(path);
                const vData = { version, date: stats.mtime.toISOString(), size: stats.size, downloadURL: `https://2kgt.github.io/repo/apps/${file}` };
                const appObj = updateAppInRepo(name, bundleId, vData);

                if (eventName === 'push' && changedFiles.includes(file)) appToNotify = { ...appObj, ...vData };
              }
            }

            // --- NGUỒN 2: QUÉT GITHUB RELEASES ---
            try {
              const releases = await github.rest.repos.listReleases({ owner: context.repo.owner, repo: context.repo.repo });
              for (const rel of releases.data) {
                for (const asset of rel.assets) {
                  if (asset.name.toLowerCase().endsWith('.ipa')) {
                    const vData = { 
                      version: extractVersion(asset.name), date: asset.updated_at, size: asset.size, 
                      downloadURL: asset.browser_download_url 
                    };
                    const appObj = updateAppInRepo(cleanAppName(asset.name), "com.kyic.release", vData);
                    if (eventName === 'release' && rel.id === context.payload.release.id) appToNotify = { ...appObj, ...vData };
                  }
                }
              }
            } catch (e) {}

            // --- DỌN DẸP (CLEANUP): XÓA NẾU KHÔNG CÒN TỆP TRÊN SERVER ---
            repoData.apps.forEach(app => {
              app.versions = app.versions.filter(v => currentFilesURLs.has(v.downloadURL));
            });
            repoData.apps = repoData.apps.filter(app => app.versions.length > 0);

            repoData.apps.forEach(app => {
              app.versions.sort((a, b) => new Date(b.date) - new Date(a.date));
              const latest = app.versions[0];
              Object.assign(app, { version: latest.version, versionDate: latest.date, size: latest.size, downloadURL: latest.downloadURL });
            });

            // Ghi file dữ liệu chính
            fs.writeFileSync('apps.json', JSON.stringify(repoData, null, 2));

            // Đẩy dữ liệu thông báo vào Output (Không tạo file rác trong repo)
            const notifyData = {
              isManual: (eventName === 'workflow_dispatch'),
              targetApp: appToNotify || repoData.apps.sort((a,b) => new Date(b.versionDate) - new Date(a.versionDate))[0]
            };
            core.setOutput("notify_info", JSON.stringify(notifyData));

      - name: "🚀 Sync & Push (Clean Repo Strategy)"
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Lưu tạm file vừa ghi vào bộ nhớ máy ảo
          cp apps.json /tmp/apps.json
          
          # Đồng bộ bản mới nhất từ server và dọn sạch các thay đổi kẹt
          git fetch origin main
          git reset --hard origin/main
          
          # Khôi phục file và thêm .nojekyll
          cp /tmp/apps.json apps.json
          touch .nojekyll
          
          git add apps.json .nojekyll
          git commit -m "Update Kyic Repository [Automated Sync]" || echo "No changes"
          git push origin main --force

      - name: 🤖 Telegram Notification
        if: always()
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TO: ${{ secrets.TELEGRAM_TO }}
          RAW_DATA: ${{ steps.update_data.outputs.notify_info }}
          JOB_STATUS: ${{ job.status }}
        run: |
          # Parse dữ liệu từ Output của bước Update
          APP_NAME=$(echo $RAW_DATA | jq -r '.targetApp.name // "Kyic Repo"')
          APP_VER=$(echo $RAW_DATA | jq -r '.targetApp.version // "1.0"')
          IPA_URL=$(echo $RAW_DATA | jq -r '.targetApp.downloadURL // "https://2kgt.github.io/repo/"')
          IS_MANUAL=$(echo $RAW_DATA | jq -r '.isManual')

          [ "$IS_MANUAL" == "true" ] && TITLE="🔄 <b>Làm mới dữ liệu Repo</b>" || TITLE="🚀 <b>Ứng dụng mới xuất hiện</b>"
          [ "$JOB_STATUS" == "success" ] && STT="Thành công ✅" || STT="Thất bại ❌"

          MSG="$TITLE
          ──────────────────
          📱 <b>Ứng dụng:</b> <code>$APP_NAME</code>
          💡 <b>Phiên bản:</b> <code>$APP_VER</code>
          📊 <b>Trạng thái:</b> <code>$STT</code>
          ⏰ <b>Thời gian:</b> <code>$(TZ="Asia/Ho_Chi_Minh" date +"%H:%M %d/%m/%Y")</code>
          ──────────────────
          🤩 <i>Hệ thống đồng bộ tự động Kyic</i>"

          KEYBOARD=$(jq -nrc --arg url1 "https://2kgt.github.io/repo/" --arg url2 "$IPA_URL" '{
            inline_keyboard: [[
              { text: "🌐 Add source", url: $url1 },
              { text: "📦 Tải về IPA", url: $url2 }
            ]]
          }')

          curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
            -d "chat_id=$TO" -d "parse_mode=HTML" \
            --data-urlencode "text=$MSG" \
            --data-urlencode "reply_markup=$KEYBOARD"
