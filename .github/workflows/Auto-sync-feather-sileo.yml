name: "Auto sync feather sileo"

on:
  push:
    branches: [main]
    paths:
      - 'repo/apps/**'
      - 'repo/debs/**'
      - 'repo/depictions/icons/**'
      - 'repo/depictions/images/**'
      - 'repo/depictions/metadata/**'
  release:
    types: [published, created, edited]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: "🛠 Cài đặt thư viện & Khởi tạo cấu trúc"
        run: |
          python -m pip install --upgrade pip
          pip install requests
          mkdir -p repo/apps repo/debs repo/depictions/icons repo/depictions/images repo/depictions/metadata

      - name: "🚀 Khởi Chạy Bộ Máy Tự Động Hóa (Core Engine)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          TELEGRAM_GROUP: ${{ secrets.TELEGRAM_GROUP }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }} 
        run: |
          # Di chuyển vào thư mục script và chạy engine
          cd .github/scripts
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python3 main.py

      - name: "📤 Commit và Push dữ liệu mới"
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. Làm sạch môi trường: Đưa local về đúng trạng thái trên server
          git fetch origin main
          git reset --hard origin/main
          
          # 2. Add toàn bộ thay đổi do main.py tạo ra
          git add -A
          
          # 3. Kiểm tra thay đổi: Nếu không có gì thay đổi thì dừng lại
          if git diff --cached --quiet; then
            echo "Không có thay đổi dữ liệu nào để commit."
            exit 0
          fi
          
          # 4. Đọc thông điệp commit đã được main.py tạo sẵn
          MESSAGE=$(cat .github/scripts/.commit_msg)
          
          # 5. Commit và Push bằng quyền Force
          git commit -m "$MESSAGE"
          git push origin HEAD:main --force
