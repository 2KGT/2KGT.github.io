name: "Auto sync feather sileo"

on:
  push:
    branches: [main]
    paths:
      - 'repo/apps/**'
      - 'repo/debs/**'
      - 'repo/depictions/**'
      - '.github/scripts/**'
  release:
    types: [published, created, edited]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Sử dụng GITHUB_TOKEN có sẵn với quyền Write đã khai báo ở trên
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: "📦 Cache Python dependencies"
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: "🛠 Cài đặt thư viện"
        run: |
          python -m pip install --upgrade pip
          pip install requests
          # Khởi tạo sẵn cấu trúc thư mục lưu trữ phẳng
          mkdir -p repo/apps repo/debs repo/depictions/icons repo/depictions/images repo/depictions/metadata

      - name: "🚀 Khởi Chạy Tự Động Hóa (Core Engine)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }} 
          PYTHONUNBUFFERED: "1" 
          PYTHONPATH: "${{ github.workspace }}/.github/scripts" 
        run: |
          python3 .github/scripts/main.py

      - name: "📤 Commit và Push dữ liệu mới"
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Đánh dấu bỏ qua tệp tin commit tạm thời để không làm kích hoạt bộ lọc paths lặp vô hạn
          git add -A
          
          # Kiểm tra xem có dữ liệu thực tế nào thay đổi không (ví dụ apps.json hoặc Packages)
          if git diff --cached --quiet; then
            echo "Không có thay đổi dữ liệu nào để commit."
            exit 0
          fi
          
          # Thiết lập tin nhắn mặc định bảo vệ luồng push
          COMMIT_MSG="🔄 Tối ưu hóa hệ thống & Đồng bộ kho lưu trữ định kỳ"
          
          # Ưu tiên bốc file từ thư mục gốc trước để tránh lặp vô hạn chu kỳ trigger .github/scripts/
          if [ -f ".commit_msg" ]; then
            COMMIT_MSG=$(cat .commit_msg)
          elif [ -f ".github/scripts/.commit_msg" ]; then
            COMMIT_MSG=$(cat ".github/scripts/.commit_msg")
          fi
          
          git commit -m "$COMMIT_MSG"
          
          # Đồng bộ hóa dữ liệu từ xa về trước khi đẩy lên nhằm loại bỏ xung đột
          git pull --rebase origin main || (git stash && git pull --rebase origin main && git stash pop)
          
          # Đẩy thẳng dữ liệu lên nhánh chính
          git push origin main
