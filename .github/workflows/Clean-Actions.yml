name: "Clean All Workflow Runs"

on:
  workflow_dispatch:

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: "Clean via GH CLI"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Lấy danh sách tất cả workflow đang tồn tại trong repo
          # Sử dụng --limit 1000 để quét rộng hơn
          gh run list --limit 1000 --json databaseId  -q '.[].databaseId' > runs.txt
          
          if [ ! -s runs.txt ]; then
            echo "✅ Không tìm thấy lượt chạy nào cần xóa."
            exit 0
          fi

          echo "🗑️ Đang xóa $(wc -l < runs.txt) lượt chạy..."
          
          # Xóa hàng loạt
          cat runs.txt | xargs -I {} gh run delete {}
          
          echo "✨ Dọn dẹp hoàn tất!"
