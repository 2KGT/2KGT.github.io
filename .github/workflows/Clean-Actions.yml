name: "Clean All Workflow Runs"

on:
  workflow_dispatch:

jobs:
  delete-runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: "Dọn dẹp từng bước"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"
          
          # 1. Lấy danh sách 500 ID lượt chạy cũ nhất (tránh quá tải)
          gh run list --repo "$REPO" --limit 500 --json databaseId -q ".[].databaseId" > runs.txt
          
          if [ ! -s runs.txt ]; then
            echo "✅ Chúc mừng! Repo đã sạch bóng rác."
            exit 0
          fi

          echo "🗑️ Đang xóa $(wc -l < runs.txt) lượt chạy..."
          
          # 2. Vòng lặp xóa từng ID một, nếu lỗi 1 cái thì vẫn tiếp tục cái sau
          while read -r run_id; do
            echo "Đang xóa: $run_id"
            gh run delete --repo "$REPO" "$run_id" || echo "⚠️ Bỏ qua lỗi ID $run_id"
          done < runs.txt
          
          echo "✨ Đã dọn xong đợt này. Nếu vẫn còn rác, hãy nhấn Run lại lần nữa!"
